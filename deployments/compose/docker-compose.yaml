version: "3.9"

# Runs two p2p-messenger nodes on the same Docker network.
# mDNS peer discovery works because both containers share the host network.
#
# Usage:
#   docker compose up --build
#   Node 1 WebSocket: ws://localhost:8080/ws
#   Node 2 WebSocket: ws://localhost:8081/ws

services:
  node1:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    network_mode: host          # required for mDNS multicast
    environment:
      HTTP_PORT: "8080"
      P2P_PORT: "9000"
    volumes:
      - node1-data:/app/data
    command: ["./p2p-server", "--http-port=8080", "--p2p-port=9000", "--data-dir=/app/data"]
    restart: unless-stopped

  node2:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    network_mode: host
    environment:
      HTTP_PORT: "8081"
      P2P_PORT: "9001"
    volumes:
      - node2-data:/app/data
    command: ["./p2p-server", "--http-port=8081", "--p2p-port=9001", "--data-dir=/app/data"]
    restart: unless-stopped

volumes:
  node1-data:
  node2-data:
